<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Çocuklar için Blockly</title>
  <script src="https://unpkg.com/blockly@10.0.0/blockly.min.js"></script>
  <style>
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      background-color: #f0f9ff;
    }
    h2 {
      color: #4a90e2;
      text-align: center;
    }
    button {
      background-color: #4CAF50;
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin: 4px 2px;
      cursor: pointer;
      border-radius: 12px;
      font-family: "Comic Sans MS", cursive, sans-serif;
    }
  </style>
</head>
<body>
  <h2>🎮 Haydi Kodlayalım! 🚀</h2>
  <div id="blocklyDiv" style="height: 480px; width: 800px;"></div>
  <button onclick="runCode()">🎯 Çalıştır!</button>

  <xml id="toolbox" style="display: none">
    <category name="🎯 Hareketler" colour="#FFD700">
      <block type="customblock"></block>
      <block type="text_block"></block>
      <block type="number_block"></block>
      <block type="alert_block"></block>
      <block type="if_block"></block>
      <block type="ping_block"></block>
      <block type="port_check_block"></block>
      <block type="and_block"></block>
      <block type="or_block"></block>
    </category>
  </xml>

<script>
  Blockly.Blocks['customblock'] = {
    init: function() {
      this.appendDummyInput().appendField("✈️ Uçağa Bin!");
      this.setPreviousStatement(true, null);
      this.setNextStatement(true, null);
      this.setColour('#FF69B4');
      this.setTooltip("Haydi uçağa binelim!");
    }
  };

  Blockly.Blocks['text_block'] = {
    init: function() {
      this.appendDummyInput()
          .appendField("📝 Yazı:")
          .appendField(new Blockly.FieldTextInput("Merhaba Arkadaşım!"), "TEXT");
      this.setPreviousStatement(true, null);
      this.setNextStatement(true, null);
      this.setColour('#9B59B6');
      this.setTooltip("Bir mesaj yazalım!");
    }
  };

  Blockly.Blocks['number_block'] = {
    init: function() {
      this.appendDummyInput()
          .appendField("🔢 Sayı:")
          .appendField(new Blockly.FieldNumber(0), "NUMBER");
      this.setPreviousStatement(true, null);
      this.setNextStatement(true, null);
      this.setColour('#3498DB');
      this.setTooltip("Bir sayı seçelim!");
    }
  };

  Blockly.Blocks['alert_block'] = {
    init: function() {
      this.appendValueInput("MESSAGE")
          .setCheck(null)
          .appendField("📧 Mesaj Gönder");
      this.setPreviousStatement(true, null);
      this.setNextStatement(true, null);
      this.setColour('#E74C3C');
      this.setTooltip("Arkadaşına mesaj gönder!");
    }
  };

  Blockly.Blocks['if_block'] = {
    init: function() {
      this.appendValueInput("CONDITION")
          .setCheck("Boolean")
          .appendField("🤔 Eğer");
      this.appendStatementInput("DO")
          .setCheck(null)
          .appendField("❌ çalışmıyorsa");
      this.setPreviousStatement(true, null);
      this.setNextStatement(true, null);
      this.setColour('#F1C40F');
      this.setTooltip("Bir şey çalışmıyorsa ne yapalım?");
    }
  };

  Blockly.Blocks['ping_block'] = {
    init: function() {
      this.appendDummyInput()
          .appendField("🏓 Top At:")
          .appendField(new Blockly.FieldTextInput("8.8.8.8"), "ADDRESS");
      this.setOutput(true, null);
      this.setColour('#2ECC71');
      this.setTooltip("Arkadaşına top at!");
    }
  };

  Blockly.Blocks['port_check_block'] = {
    init: function() {
      this.appendDummyInput()
          .appendField("🚪 Kapı Kontrol:")
          .appendField(new Blockly.FieldTextInput("80"), "PORT");
      this.setOutput(true, null);
      this.setColour('#E67E22');
      this.setTooltip("Kapı açık mı bakalım!");
    }
  };

  Blockly.Blocks['and_block'] = {
    init: function() {
      this.appendValueInput("A").setCheck(null);
      this.appendValueInput("B").setCheck(null).appendField("🤝 ve");
      this.setOutput(true, null);
      this.setColour('#1ABC9C');
      this.setTooltip("İkisi de olsun!");
    }
  };

  Blockly.Blocks['or_block'] = {
    init: function() {
      this.appendValueInput("A").setCheck(null);
      this.appendValueInput("B").setCheck(null).appendField("🔄 ya da");
      this.setOutput(true, null);
      this.setColour('#95A5A6');
      this.setTooltip("Biri olsa yeter!");
    }
  };

  const javascriptGenerator = Blockly.JavaScript;

  javascriptGenerator.forBlock['customblock'] = function(block) {
    return 'window.open("https://www.thy.com", "_blank");\n';
  };

  javascriptGenerator.forBlock['text_block'] = function(block) {
    var text = block.getFieldValue('TEXT');
    return 'console.log("' + text + '");\n';
  };

  javascriptGenerator.forBlock['number_block'] = function(block) {
    var number = block.getFieldValue('NUMBER');
    return 'console.log(' + number + ');\n';
  };

  javascriptGenerator.forBlock['alert_block'] = function(block) {
    var message = javascriptGenerator.valueToCode(block, 'MESSAGE', javascriptGenerator.ORDER_ATOMIC) || '""';
    return 'alert(' + message + ');\n';
  };

  javascriptGenerator.forBlock['if_block'] = function(block) {
    var condition = javascriptGenerator.valueToCode(block, 'CONDITION', javascriptGenerator.ORDER_NONE) || 'false';
    var statements_do = javascriptGenerator.statementToCode(block, 'DO');
    var code = 'if (' + condition + ') {\n' + statements_do + '}\n';
    return code;
  };

  javascriptGenerator.forBlock['ping_block'] = function(block) {
    var addr = block.getFieldValue('ADDRESS');
    var code = '"' + addr + '" === "8.8.8.8"';
    return [code, Blockly.JavaScript.ORDER_EQUALITY];
  };
  
  javascriptGenerator.forBlock['port_check_block'] = function(block) {
    var port = block.getFieldValue('PORT');
    var code = port + ' == 80';
    return [code, Blockly.JavaScript.ORDER_EQUALITY];
  };

  javascriptGenerator.forBlock['and_block'] = function(block) {
    var value_a = javascriptGenerator.valueToCode(block, 'A', javascriptGenerator.ORDER_LOGICAL_AND) || 'false';
    var value_b = javascriptGenerator.valueToCode(block, 'B', javascriptGenerator.ORDER_LOGICAL_AND) || 'false';
    var code = value_a + ' && ' + value_b;
    return [code, Blockly.JavaScript.ORDER_LOGICAL_AND];
  };
  
  javascriptGenerator.forBlock['or_block'] = function(block) {
    var value_a = javascriptGenerator.valueToCode(block, 'A', javascriptGenerator.ORDER_LOGICAL_OR) || 'false';
    var value_b = javascriptGenerator.valueToCode(block, 'B', javascriptGenerator.ORDER_LOGICAL_OR) || 'false';
    var code = value_a + ' || ' + value_b;
    return [code, Blockly.JavaScript.ORDER_LOGICAL_OR];
  };

  var workspace = Blockly.inject('blocklyDiv', {
    toolbox: document.getElementById('toolbox'),
    trashcan: true,
    scrollbars: true,
    grid: {
      spacing: 25,
      length: 3,
      colour: '#ccc',
      snap: true
    },
    zoom: {
      controls: true,
      wheel: true,
      startScale: 1.0,
      maxScale: 3,
      minScale: 0.3,
      scaleSpeed: 1.2
    }
  });

  function runCode() {
    var code = Blockly.JavaScript.workspaceToCode(workspace);
    console.log("Üretilen Kod:", code);
    try {
      eval(code);
    } catch (error) {
      console.error("Hata oluştu:", error);
    }
  }
</script>

</body>
</html>
